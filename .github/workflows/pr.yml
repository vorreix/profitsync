# Mirrors the local pre-commit gate (.husky/pre-commit):
#   i18n parity -> lint -> type check -> tests.
# (The Makefile's "format" step is `eslint --fix`, which mutates files;
#  in CI we run plain `eslint .` as the equivalent check.)
name: PR

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  checks:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: i18n parity
        run: npm run i18n:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm run test:ci
