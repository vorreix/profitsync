<!doctype html>
<!--
  Source for public/og-image.png — the 1200x630 social-share / Open Graph image.
  Self-contained (logo referenced relatively). To regenerate the PNG:
    open this file in a 1200x630 viewport and screenshot, OR run a headless
    browser (Playwright/Chrome) at deviceScaleFactor 2 and capture #card.
  Committed so the brand card can be re-rendered without external design tools.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      #card {
        width: 1200px;
        height: 630px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 72px 80px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #f5f7fa;
        background:
          radial-gradient(120% 120% at 12% 0%, #1b3a2e 0%, transparent 55%),
          radial-gradient(120% 120% at 100% 100%, #16264f 0%, transparent 55%),
          linear-gradient(150deg, #0a0f0d 0%, #0b1220 100%);
      }
      /* faint dotted grid for texture */
      #card::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(rgba(255,255,255,0.05) 1.4px, transparent 1.4px);
        background-size: 30px 30px;
        opacity: 0.7;
        pointer-events: none;
      }
      .top { display: flex; align-items: center; gap: 22px; position: relative; z-index: 1; }
      .mark {
        width: 96px; height: 96px; border-radius: 22px; background: #ffffff;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      }
      .mark img { width: 78px; height: 78px; object-fit: contain; }
      .brand { font-size: 44px; font-weight: 800; letter-spacing: -0.02em; }
      .brand b {
        background: linear-gradient(90deg, #4ade80 0%, #38bdf8 55%, #6366f1 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .mid { position: relative; z-index: 1; }
      h1 {
        font-size: 92px; line-height: 1.04; font-weight: 800; letter-spacing: -0.03em;
        max-width: 1000px;
      }
      h1 .accent {
        background: linear-gradient(90deg, #4ade80 0%, #34d399 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      p.sub {
        margin-top: 30px; font-size: 36px; line-height: 1.32; font-weight: 450;
        color: #c4cdda; max-width: 940px;
      }
      .bottom {
        display: flex; align-items: center; justify-content: space-between;
        position: relative; z-index: 1;
      }
      .url { font-size: 34px; font-weight: 700; color: #e6ebf2; }
      .pills { display: flex; gap: 14px; }
      .pill {
        font-size: 26px; font-weight: 600; color: #aeb9c9;
        border: 1.5px solid rgba(255,255,255,0.16); border-radius: 999px;
        padding: 12px 26px; background: rgba(255,255,255,0.04);
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div class="top">
        <div class="mark"><img src="../public/logo-mark.png" alt="ProfitSync" /></div>
        <div class="brand">Profit<b>Sync</b></div>
      </div>

      <div class="mid">
        <h1>Know your <span class="accent">profit.</span><br />Sync your business.</h1>
        <p class="sub">Clients, cash flow &amp; quotations in one clean workspace — so you always know exactly where your money stands.</p>
      </div>

      <div class="bottom">
        <div class="url">profitsync.net</div>
        <div class="pills">
          <div class="pill">Expense tracking</div>
          <div class="pill">Profit dashboard</div>
          <div class="pill">Multi-currency</div>
        </div>
      </div>
    </div>
  </body>
</html>
