  <!--
    Stale-cache recovery. After a new deploy, a returning client can be served a
    stale app shell (from a service worker in a bad state, or an HTTP cache) that
    points at hashed chunks which no longer exist. The *entry* module script
    failing happens before React mounts, so the in-app error boundary can't catch
    it — this dependency-free inline script can. It reloads up to 3 times with
    backoff (0ms, 500ms, 1500ms): attempt 1 uses a cache-bust query param (forces
    a fresh index.html past any HTTP cache); attempts 2+ first unregister every
    service worker and delete every cache, which is the only way to escape a
    zombie worker that keeps answering navigations with a frozen shell. Mirrors
    src/lib/pwa/chunk-recovery.ts and shares its guard key so the recovery paths
    cooperate.
  -->
  <script>
    (function () {
      var KEY = "profitsync-chunk-reload";
      var MAX_ATTEMPTS = 3;
      var BACKOFF_MS = [0, 500, 1500];
      function isAssetLoadError(t) {
        if (!t || (t.tagName !== "SCRIPT" && t.tagName !== "LINK")) return false;
        var url = t.src || t.href || "";
        return url.indexOf("/assets/") !== -1;
      }
      function purgeSwAndCaches() {
        var jobs = [];
        try {
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            jobs.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister().catch(function () { return false; }); }));
            }));
          }
        } catch (_) { /* best effort */ }
        try {
          if (window.caches && caches.keys) {
            jobs.push(caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k).catch(function () { return false; }); }));
            }));
          }
        } catch (_) { /* best effort */ }
        return Promise.all(jobs);
      }
      function reloadWithCacheBust() {
        // The counter lives in sessionStorage AND in the recovery URL: in private
        // mode storage writes throw, and without the URL copy every reload would
        // restart from attempt 0 — an infinite reload loop. Mirrors chunk-recovery.ts.
        var attemptCount = 0;
        try {
          var stored = sessionStorage.getItem(KEY);
          attemptCount = stored ? parseInt(stored, 10) : 0;
        } catch (_) { /* private mode — URL counter below */ }
        try {
          var fromUrl = parseInt(new URLSearchParams(window.location.search).get("_cache_bust_n") || "0", 10) || 0;
          if (fromUrl > attemptCount) attemptCount = fromUrl;
        } catch (_) { /* ignore */ }
        if (attemptCount >= MAX_ATTEMPTS) return;
        attemptCount += 1;
        try {
          sessionStorage.setItem(KEY, String(attemptCount));
        } catch (_) { /* private mode */ }
        var backoffMs = BACKOFF_MS[attemptCount - 1] || 0;
        var doReload = function () {
          // Strip any prior recovery params so retries never accumulate, then replace
          // (no junk history entry). Bypasses stale HTTP cache for a fresh shell.
          var params = new URLSearchParams(window.location.search);
          params.delete("_cache_bust");
          params.delete("_cache_bust_n");
          params.set("_cache_bust", String(Date.now()));
          params.set("_cache_bust_n", String(attemptCount));
          var query = params.toString();
          window.location.replace(window.location.pathname + (query ? "?" + query : "") + window.location.hash);
        };
        var run = function () {
          if (attemptCount >= 2) {
            purgeSwAndCaches().then(doReload, doReload);
          } else {
            doReload();
          }
        };
        if (backoffMs > 0) {
          window.setTimeout(run, backoffMs);
        } else {
          run();
        }
      }
      window.addEventListener("error", function (e) {
        if (!isAssetLoadError(e.target)) return;
        reloadWithCacheBust();
      }, true);
      window.addEventListener("load", function () {
        window.setTimeout(function () {
          try { sessionStorage.removeItem(KEY); } catch (_) { /* ignore */ }
        }, 30000); // Extended from 10s to 30s to allow multiple retries with backoff
      });
    })();
  </script>
